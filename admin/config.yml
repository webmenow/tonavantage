backend:
  name: github
  repo: sergei-shevchenko/tonavantage
  branch: main
  base_url: https://sveltia-cms-auth.sergei-shevchenko.workers.dev

media_folder: assets/images
public_folder: /assets/images

collections:
  - name: pages
    label: Pages
    files:
      - label: Home
        name: index
        file: index.md
        fields:
          - { label: Title, name: title, widget: text }
          - { label: Body, name: body, widget: markdown }
